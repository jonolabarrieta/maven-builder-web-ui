name: Release Native Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            suffix: linux-amd64
          - os: windows-latest
            runner: windows-latest
            suffix: windows-amd64.exe
          - os: macos-13
            runner: macos-13
            suffix: macos-amd64
          - os: macos-14
            runner: macos-14
            suffix: macos-arm64
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Native Image
        run: mvn -Pnative native:compile -DskipTests

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/mvn-builder.exe release-artifacts/mvn-builder-${{ github.ref_name }}-${{ matrix.suffix }}
          else
            cp target/mvn-builder release-artifacts/mvn-builder-${{ github.ref_name }}-${{ matrix.suffix }}
          fi
          
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            cp target/mvn-builder-*.jar release-artifacts/mvn-builder-${{ github.ref_name }}.jar
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker Context
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cp target/mvn-builder release-artifacts/mvn-builder-linux-amd64

      - name: Log in to GitHub Container Registry
        if: matrix.os == 'ubuntu-latest'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: matrix.os == 'ubuntu-latest'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
