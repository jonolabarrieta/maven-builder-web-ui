<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maven Workspace Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="text-gray-900">
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">M</div>
            <span class="text-xl font-bold tracking-tight text-gray-800">MvnBuilder</span>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="document.getElementById('new-workspace-modal').classList.remove('hidden')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-all shadow-md font-medium">
                + New Workspace
            </button>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-6 py-12 flex flex-col gap-8">
        <!-- M2 Favorites Panel (Top, Always Visible) -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden p-6 space-y-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-gray-100 pb-4">
                <h3 class="text-lg font-bold text-gray-800 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    M2 Global Favorites
                </h3>
                <form hx-post="/settings/m2-favorites/add" hx-target="#m2-favorites-content" class="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
                    <select name="groupId" required class="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none bg-white min-w-[200px]">
                        <option value="" disabled selected>Select folder from M2...</option>
                        <option th:each="g : ${availableGroupIds}" th:value="${g}" th:text="${g}"></option>
                    </select>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-lg transition-all text-sm font-semibold shadow-sm">
                        Add Favorite
                    </button>
                </form>
            </div>
            <div id="m2-favorites-content" hx-get="/settings/m2-favorites" hx-trigger="load">
                <div class="flex justify-center p-4">
                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-indigo-600"></div>
                </div>
            </div>
        </div>

        <!-- Workspaces Section -->
        <div class="flex-grow flex-1 min-w-0">
            <header class="mb-12">
                <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Workspaces</h1>
                <p class="text-gray-500">Manage and build your Maven project collections.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                <div th:each="ws : ${workspaces}" class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-xl transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-indigo-50 rounded-xl group-hover:bg-indigo-100 transition-colors text-indigo-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                            </svg>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-full uppercase tracking-wider" th:text="${ws.projects.size() + ' Projects'}">0 Projects</span>
                            <form th:action="@{/workspaces/{id}/duplicate(id=${ws.id})}" method="POST" class="inline">
                                <button type="submit" class="text-gray-300 hover:text-indigo-500 transition-colors p-1" title="Duplicate Workspace">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                                    </svg>
                                </button>
                            </form>
                            <form th:action="@{/workspaces/{id}/delete(id=${ws.id})}" method="POST" onsubmit="return confirm('Are you sure you want to delete this workspace?');" class="inline">
                                <button type="submit" class="text-gray-300 hover:text-red-500 transition-colors p-1" title="Delete Workspace">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-1" th:text="${ws.name}">Workspace Name</h3>
                    <p class="text-gray-400 text-sm mb-6 truncate" th:text="${ws.basePath}">/home/user/projects</p>
                    
                    <a th:href="@{/workspaces/{id}(id=${ws.id})}" class="inline-flex items-center text-indigo-600 font-semibold group-hover:translate-x-1 transition-transform">
                        Open Workspace
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>

                <!-- Empty State -->
                <div th:if="${workspaces.empty}" class="col-span-full py-20 text-center">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-100 rounded-full text-gray-300 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold text-gray-700">No workspaces yet</h2>
                    <p class="text-gray-400 mb-8">Create your first workspace to start managing projects.</p>
                    <button onclick="document.getElementById('new-workspace-modal').classList.remove('hidden')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl transition-all shadow-lg font-bold">
                        Create Workspace
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="new-workspace-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl transform transition-all">
            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-2xl font-bold text-gray-800">New Workspace</h3>
                <button onclick="document.getElementById('new-workspace-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form action="/workspaces" method="POST" class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Workspace Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="e.g. My Microservices">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Base Directory Path</label>
                    <input type="text" name="basePath" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="/home/user/dev/projects">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" name="skipScan" id="skipScan" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    <label for="skipScan" class="ml-2 text-sm text-gray-600">Create empty (skip initial scan)</label>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-indigo-200 shadow-xl">
                    Create Workspace
                </button>
            </form>
        </div>
    </div>

    <script>
        // Close modals when clicking outside
        window.onclick = function(event) {
            const newWsModal = document.getElementById('new-workspace-modal');
            if (event.target == newWsModal) newWsModal.classList.add('hidden');
        }
    </script>
</body>
</html>
