<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="children-list" id="children-content" class="max-h-[80vh] flex flex-col">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 sticky top-0 z-10">
            <div class="flex items-center space-x-3">
                <button th:if="${grandParent != null}"
                        th:attr="hx-get=@{/projects/{id}/children(id=${grandParent.id})}"
                        hx-target="#children-modal-content"
                        class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" title="Go Back">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
                <div>
                    <h3 class="text-lg font-bold text-gray-800" th:text="${parentProject.artifactId}">parent-artifact</h3>
                    <p class="text-[10px] text-gray-400 font-mono" th:text="${parentProject.groupId}">group.id</p>
                </div>
            </div>
            <button onclick="document.getElementById('children-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <div class="flex-grow overflow-y-auto">
            <div th:if="${#lists.isEmpty(children)}" class="p-12 text-center">
                <div class="bg-gray-50 rounded-2xl p-8 border border-dashed border-gray-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <p class="text-gray-400 font-medium">No submodules found at this level.</p>
                </div>
            </div>

            <div th:unless="${#lists.isEmpty(children)}" class="divide-y divide-gray-50">
                <div th:each="child : ${children}" class="p-4 hover:bg-gray-50 transition-colors group">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-xs" th:text="${child.artifactId.substring(0,1).toUpperCase()}">A</div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="text-sm font-bold text-gray-800" th:text="${child.artifactId}">artifact-id</span>
                                    <span class="px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded text-[9px] font-bold border border-gray-200" th:text="${child.version}">1.0.0</span>
                                </div>
                                <div class="text-[10px] text-gray-400 font-mono" th:text="${child.groupId}">group.id</div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-1">
                            <button th:if="${child.hasChildren()}"
                                    th:attr="hx-get=@{/projects/{id}/children(id=${child.id})}"
                                    hx-target="#children-modal-content"
                                    class="p-1.5 text-indigo-600 hover:bg-indigo-50 rounded-md transition-all flex items-center space-x-1" title="View Submodules">
                                <span class="text-[10px] font-bold uppercase mr-1">Dive</span>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                </svg>
                            </button>
                            <button th:attr="hx-get=@{/projects/{id}/properties(id=${child.id})}"
                                    hx-target="#project-properties-modal-content"
                                    hx-trigger="click"
                                    onclick="document.getElementById('project-properties-modal').classList.remove('hidden')"
                                    class="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-all" title="Project Properties">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                            </button>
                            <button th:attr="hx-post=@{/projects/{id}/build(id=${child.id})}" class="p-1.5 text-green-600 hover:bg-green-50 rounded-md transition-all" title="Build Submodule">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="mt-2 pl-11">
                        <div class="flex items-center text-[10px] text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                            </svg>
                            <span th:text="${child.relativePath}">path/to/submodule</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest" th:text="${children.size() + ' direct submodules'}">0 submodules</span>
            <button onclick="document.getElementById('children-modal').classList.add('hidden')" class="bg-white border border-gray-200 px-4 py-2 rounded-lg text-xs font-bold text-gray-600 hover:bg-gray-50 transition-all shadow-sm">Close</button>
        </div>
    </div>
</body>
</html>
