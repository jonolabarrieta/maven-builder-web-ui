<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="m2-list" id="m2-content" class="max-h-[80vh] flex flex-col">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 sticky top-0 z-10">
            <div>
                <h3 class="text-lg font-bold text-gray-800" th:text="${project.artifactId}">artifact-id</h3>
                <p class="text-xs text-gray-400 font-mono" th:text="${project.groupId}">group.id</p>
            </div>
            <button onclick="document.getElementById('m2-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <div class="flex-grow overflow-y-auto">
            <!-- Parent Project M2 Info -->
            <div th:if="${m2Info != null}" th:replace="~{:: m2-item(info=${m2Info})}"></div>

            <!-- Children Projects M2 Info -->
            <div th:if="${not #lists.isEmpty(childM2Infos)}" class="mt-4 border-t border-gray-100 bg-gray-50/30">
                <div class="px-6 py-2 bg-gray-100/50 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Submodules Artifacts</div>
                <div th:each="childInfo : ${childM2Infos}" class="border-b border-gray-50 last:border-0">
                    <div th:if="${childInfo != null}" th:replace="~{:: m2-item(info=${childInfo})}"></div>
                </div>
            </div>
        </div>

        <!-- Single Project Item Fragment -->
        <div th:fragment="m2-item(info)" class="p-6" th:if="${info != null}">
            <div class="flex items-center justify-between mb-4">
                <div th:if="${info.projectId != (project != null ? project.id : -1)}">
                    <span class="text-sm font-bold text-indigo-600" th:text="${info.artifactId}">child-artifact</span>
                    <span class="text-[10px] text-gray-400 font-mono ml-2" th:text="${info.groupId}">group.id</span>
                </div>
                <h4 th:if="${info.projectId == project.id}" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Installed Versions</h4>
                <h4 th:if="${info.projectId != project.id}" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Versions</h4>
                
                <button th:if="${not #lists.isEmpty(info.versions)}"
                        th:attr="hx-post=@{/projects/{id}/m2/delete-all(id=${info.projectId})}"
                        hx-confirm="Are you sure you want to delete ALL versions of this project from .m2?"
                        hx-target="#m2-content"
                        hx-swap="outerHTML"
                        class="text-[10px] font-bold text-red-600 hover:text-red-700 uppercase tracking-widest flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Delete All
                </button>
            </div>

            <div th:if="${#lists.isEmpty(info.versions)}" class="text-center py-4 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                <p class="text-[11px] text-gray-400">No artifacts found in .m2</p>
            </div>
            
            <div th:unless="${#lists.isEmpty(info.versions)}" class="grid grid-cols-1 gap-2">
                <div th:each="version : ${info.versions}" class="flex justify-between items-center px-3 py-2 bg-white border border-gray-100 rounded-lg hover:border-indigo-100 transition-all group">
                    <span class="text-xs font-semibold text-gray-700" th:text="${version}">1.0.0</span>
                    <button th:attr="hx-post=@{/projects/{id}/m2/delete-version(id=${info.projectId}, version=${version})}"
                            hx-confirm="Delete this version from .m2?"
                            hx-target="#m2-content"
                            hx-swap="outerHTML"
                            class="p-1 text-gray-300 hover:text-red-600 hover:bg-red-50 rounded transition-all opacity-0 group-hover:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="mt-4 pt-2 border-t border-gray-50">
                <div class="text-[9px] font-bold text-gray-300 uppercase mb-1">Local Path</div>
                <div class="text-[9px] text-gray-400 font-mono break-all" th:text="${info.absolutePath}">/path/to/m2</div>
            </div>
        </div>
    </div>
</body>
</html>
