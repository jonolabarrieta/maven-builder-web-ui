<div th:fragment="branch-list" class="flex flex-col animate-in fade-in zoom-in duration-200" id="branch-modal-content-inner">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
        <div>
            <h3 class="text-lg font-bold text-gray-800" th:text="${project.artifactId}">Project Name</h3>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Branch Management</p>
        </div>
        <button onclick="document.getElementById('branch-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 transition-colors p-2 hover:bg-gray-100 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <!-- Tab Navigation & Fetch Button -->
    <div class="px-6 border-b border-gray-100 bg-gray-50/30 flex justify-between items-center">
        <div class="flex space-x-4">
            <button id="branch-tab-btn-local" onclick="switchBranchTab('local')" class="branch-tab-btn py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-indigo-600 text-indigo-600 outline-none transition-all">
                Local
            </button>
            <button id="branch-tab-btn-remote" onclick="switchBranchTab('remote')" class="branch-tab-btn py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 outline-none transition-all">
                Remote
            </button>
            <button id="branch-tab-btn-tags" onclick="switchBranchTab('tags')" class="branch-tab-btn py-3 text-xs font-bold uppercase tracking-wider border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 outline-none transition-all">
                Tags
            </button>
        </div>
        
        <button th:attr="hx-post=@{/projects/{id}/branches/fetch(id=${project.id})}"
                hx-target="#branch-modal-content"
                hx-swap="innerHTML"
                onclick="document.getElementById('branch-list-container').classList.add('hidden'); document.getElementById('branch-loading').classList.remove('hidden');"
                class="flex items-center space-x-1 px-3 py-1.5 text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-all shadow-sm group/modal-fetch"
                title="Git Fetch">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-400 group-hover/modal-fetch:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            <span>Fetch</span>
        </button>
    </div>

    <div class="p-6">
        <!-- Spinner (hidden by default) -->
        <div id="branch-loading" class="hidden py-12 text-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mx-auto mb-4"></div>
            <p class="text-sm font-medium text-gray-500">Processing request...</p>
        </div>

        <div id="branch-list-container" class="space-y-6">
            <div>
                <!-- Local branches -->
                <div id="branch-panel-local" class="branch-tab-panel space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-3">Local Branches</label>
                    <div class="max-h-60 overflow-y-auto space-y-1 pr-1 custom-scrollbar">
                        <button th:each="branch : ${branches}" 
                                th:attr="onclick=|confirmAndCheckout('${project.id}', '${branch}')|"
                                th:class="${branch == currentBranch ? 'w-full text-left px-4 py-3 text-sm font-bold text-indigo-600 bg-indigo-50 rounded-xl flex items-center justify-between' : 'w-full text-left px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 rounded-xl transition-colors border border-transparent hover:border-gray-100'}"
                                th:text="${branch}">
                            branch-name
                            <svg th:if="${branch == currentBranch}" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </button>
                        <div th:if="${#lists.isEmpty(branches)}" class="py-6 text-center text-xs text-gray-400 font-medium">
                            No local branches found.
                        </div>
                    </div>
                </div>

                <!-- Remote branches -->
                <div id="branch-panel-remote" class="branch-tab-panel hidden space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-3">Remote Branches</label>
                    <div class="max-h-60 overflow-y-auto space-y-1 pr-1 custom-scrollbar">
                        <button th:each="branch : ${remoteBranches}" 
                                th:attr="onclick=|confirmAndCheckout('${project.id}', '${branch}')|"
                                th:class="${branch == currentBranch ? 'w-full text-left px-4 py-3 text-sm font-bold text-indigo-600 bg-indigo-50 rounded-xl flex items-center justify-between' : 'w-full text-left px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 rounded-xl transition-colors border border-transparent hover:border-gray-100'}"
                                th:text="${branch}">
                            branch-name
                            <svg th:if="${branch == currentBranch}" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </button>
                        <div th:if="${#lists.isEmpty(remoteBranches)}" class="py-6 text-center text-xs text-gray-400 font-medium">
                            No remote branches found.
                        </div>
                    </div>
                </div>

                <!-- Tags -->
                <div id="branch-panel-tags" class="branch-tab-panel hidden space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-3">Git Tags</label>
                    <div class="max-h-60 overflow-y-auto space-y-1 pr-1 custom-scrollbar">
                        <button th:each="tag : ${tags}" 
                                th:attr="onclick=|confirmAndCheckout('${project.id}', '${tag}')|"
                                th:class="${tag == currentBranch ? 'w-full text-left px-4 py-3 text-sm font-bold text-indigo-600 bg-indigo-50 rounded-xl flex items-center justify-between' : 'w-full text-left px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 rounded-xl transition-colors border border-transparent hover:border-gray-100'}"
                                th:text="${tag}">
                            tag-name
                            <svg th:if="${tag == currentBranch}" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </button>
                        <div th:if="${#lists.isEmpty(tags)}" class="py-6 text-center text-xs text-gray-400 font-medium">
                            No tags found.
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="pt-6 border-t border-gray-100">
                <form th:attr="hx-post=@{/projects/{id}/create-branch(id=${project.id})}"
                      hx-swap="none"
                      hx-on:htmx:after-request="if(event.detail.successful) { window.location.reload(); } else { alert('Error creating branch:\n' + event.detail.xhr.responseText); window.location.reload(); }"
                      onsubmit="document.getElementById('branch-list-container').classList.add('hidden'); document.getElementById('branch-loading').classList.remove('hidden');"
                      class="space-y-3">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block">Create New Branch</label>
                    <div class="flex space-x-2">
                        <input type="text" name="branch" required placeholder="feature/new-branch" 
                               class="flex-grow px-4 py-2.5 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 font-bold">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function switchBranchTab(tabName) {
            document.querySelectorAll('.branch-tab-panel').forEach(function(panel) {
                panel.classList.add('hidden');
            });
            document.getElementById('branch-panel-' + tabName).classList.remove('hidden');

            document.querySelectorAll('.branch-tab-btn').forEach(function(btn) {
                btn.classList.remove('border-indigo-600', 'text-indigo-600');
                btn.classList.add('border-transparent', 'text-gray-500', 'hover:text-gray-700', 'hover:border-gray-300');
            });
            var activeBtn = document.getElementById('branch-tab-btn-' + tabName);
            if (activeBtn) {
                activeBtn.classList.remove('border-transparent', 'text-gray-500', 'hover:text-gray-700', 'hover:border-gray-300');
                activeBtn.classList.add('border-indigo-600', 'text-indigo-600');
            }
        }

        function confirmAndCheckout(projectId, refName) {
            ConfirmationModal.show({
                title: 'Switch Reference',
                message: 'Are you sure you want to checkout the project to <strong>' + refName + '</strong>?',
                confirmLabel: 'Confirm',
                cancelLabel: 'Cancel',
                danger: false,
                onConfirm: function() {
                    document.getElementById('branch-list-container').classList.add('hidden');
                    document.getElementById('branch-loading').classList.remove('hidden');

                    var formData = new FormData();
                    formData.append('branch', refName);

                    fetch('/projects/' + projectId + '/checkout', {
                        method: 'POST',
                        body: formData
                    })
                    .then(function(response) {
                        if (response.ok) {
                            window.location.reload();
                        } else {
                            response.text().then(function(text) {
                                alert('Error switching reference:\n' + text);
                                window.location.reload();
                            });
                        }
                    })
                    .catch(function(error) {
                        alert('Error: ' + error.message);
                        window.location.reload();
                    });
                }
            });
        }
    </script>
</div>
