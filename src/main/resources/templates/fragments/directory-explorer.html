<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="directory-explorer-content">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <div>
                <h3 class="text-lg font-bold text-gray-800">Directory Explorer</h3>
                <p class="text-xs text-gray-400 font-mono truncate max-w-xs" th:text="${currentPath}">/path/to/dir</p>
            </div>
            <button type="button" onclick="closeDirectoryExplorerModal()" class="text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <div class="p-4 h-[350px] overflow-y-auto">
            <div th:if="${parentPath != null}" class="mb-2">
                <button type="button" th:attr="hx-get=@{/workspaces/explorer(path=${parentPath}, targetInputId=${targetInputId})}"
                        hx-target="#directory-explorer-modal-content"
                        class="flex items-center space-x-2 w-full p-2 hover:bg-indigo-50 rounded-lg text-indigo-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                    </svg>
                    <span class="text-sm font-bold">.. / Up</span>
                </button>
            </div>
            
            <div class="space-y-1">
                <!-- Only show directories -->
                <div th:each="item : ${items}" th:if="${item.directory}" class="flex items-center justify-between p-2 hover:bg-gray-50 rounded-lg group transition-all">
                    <div class="flex items-center space-x-3 flex-grow cursor-pointer" 
                         th:attr="hx-get=@{/workspaces/explorer(path=${item.path}, targetInputId=${targetInputId})}"
                         hx-target="#directory-explorer-modal-content">
                        <div class="p-2 bg-amber-50 text-amber-600 rounded-lg group-hover:bg-amber-100 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                            </svg>
                        </div>
                        <span class="text-sm font-medium text-gray-700" th:text="${item.name}">folder-name</span>
                    </div>
                </div>
                <!-- If there are no subdirectories -->
                <div th:if="${items == null or #lists.isEmpty(items) or #lists.isEmpty(items.?[directory])}" class="py-8 text-center text-sm text-gray-400 italic">
                    No subdirectories
                </div>
            </div>
        </div>
        
        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
            <span class="text-xs text-gray-400 font-medium truncate max-w-[250px]" th:text="'Selected: ' + ${currentPath}">Selected path</span>
            <button type="button" th:attr="data-path=${currentPath}, data-target=${targetInputId}"
                    onclick="selectWorkspaceDirectory(this.getAttribute('data-path'), this.getAttribute('data-target'))"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-all shadow-md font-bold text-sm">
                Select Folder
            </button>
        </div>
    </div>
</body>
</html>
