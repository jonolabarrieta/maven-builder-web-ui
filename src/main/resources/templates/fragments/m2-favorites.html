<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="m2-favorites-list" id="m2-favorites-content">
        <div th:if="${favorites.empty}" class="text-center py-8 text-gray-500">
            No favorite folders configured.
        </div>
        
        <ul class="divide-y divide-gray-100">
            <li th:each="fav : ${favorites}" class="py-4 flex justify-between items-center group">
                <div>
                    <p class="font-semibold text-gray-800" th:text="${fav.groupId}">r01.fabric.coreservices</p>
                    <p class="text-xs text-gray-400 font-mono" th:text="${'~/.m2/repository/' + fav.groupId.replace('.', '/')}">~/.m2/repository/...</p>
                </div>
                <div class="flex items-center space-x-2">
                    <button th:attr="hx-post=@{/settings/m2-favorites/{id}/clear-m2(id=${fav.id})}" 
                            hx-confirm="Are you sure you want to delete this ENTIRE folder from your local M2 repository?"
                            hx-swap="none"
                            class="px-3 py-1.5 text-xs font-semibold text-red-600 bg-red-50 border border-red-100 rounded-lg hover:bg-red-100 transition-colors shadow-sm"
                            title="Delete folder from M2">
                        Clear M2
                    </button>
                    <button th:attr="hx-post=@{/settings/m2-favorites/{id}/delete(id=${fav.id})}"
                            hx-target="#m2-favorites-content"
                            class="p-1.5 text-gray-400 hover:text-gray-600 transition-colors rounded-lg hover:bg-gray-100"
                            title="Remove from favorites">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
